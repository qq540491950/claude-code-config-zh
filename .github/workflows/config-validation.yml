name: Config Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Codex config structure
        working-directory: codex
        run: node scripts/validate-config.js

      - name: Run Codex smoke and integrity tests
        working-directory: codex
        run: node tests/run-all.js
