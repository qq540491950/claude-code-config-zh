# 完整治理模板（团队/组织）

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
project_doc_fallback_filenames = ["TEAM_GUIDE.md", ".agents.md"]
project_doc_max_bytes = 65536
notify = ["node", ".codex/scripts/notify-turn-end.js"]
review_model = "gpt-5-codex"

[features]
collaboration_modes = true
request_rule = true
shell_tool = true
multi_agent = true
personality = true
apps = true

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_PERSONAL_ACCESS_TOKEN = "YOUR_GITHUB_PAT_HERE" }

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "YOUR_PROJECTS_DIR_HERE"]

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@context7/mcp-server"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.exa_web_search]
command = "npx"
args = ["-y", "exa-mcp-server"]
env = { EXA_API_KEY = "YOUR_EXA_API_KEY_HERE" }

[mcp_servers.firecrawl]
command = "npx"
args = ["-y", "firecrawl-mcp"]
env = { FIRECRAWL_API_KEY = "YOUR_FIRECRAWL_KEY_HERE" }

[mcp_servers.vercel]
url = "https://mcp.vercel.com"

